# CRM Software Queries

# List all projects
query ListProjects @auth(level: USER) {
  projects {
    id
    name
    company
    belongsTo
    status
    assignedTo
    assignedToName
    deadline
    document
    description
  }
}

# Get project by id
query GetProjectById($id: String!) @auth(level: USER) {
  project(id: $id) {
    id
    name
    company
    belongsTo
    status
    assignedTo
    assignedToName
    deadline
    document
    description
  }
}

# List all tenders
query ListTenders @auth(level: USER) {
  tenders {
    id
    name
    company
    belongsTo
    status
    assignedTo
    assignedToName
    deadline
