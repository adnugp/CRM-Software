<!DOCTYPE html>
<html>
<head>
    <title>🧪 Test Simplified Server</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-btn { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 5px; white-space: pre-wrap; font-family: monospace; }
        .success { background: #d4edda; border-left: 4px solid #28a745; }
    </style>
</head>
<body>
    <h1>🧪 Test Simplified CRM Server</h1>
    <p>Testing the cleaned-up server with all optimization removed!</p>
    
    <h2>Quick Tests</h2>
    <button class="test-btn" onclick="testQuery('how many tenders')">How Many Tenders</button>
    <button class="test-btn" onclick="testQuery('ajumal projects')">Ajumal Projects</button>
    <button class="test-btn" onclick="testQuery('active employees')">Active Employees</button>
    <button class="test-btn" onclick="testQuery('how many files')">How Many Files</button>
    <button class="test-btn" onclick="testQuery('hello')">Hello Test</button>
    
    <h2>Results</h2>
    <div id="results"></div>

    <script>
        let ws;
        function connectWebSocket() {
            ws = new WebSocket('ws://localhost:3001');
            ws.onopen = () => addResult('✅ Connected to simplified server!', 'success');
            ws.onmessage = (event) => {
                const response = JSON.parse(event.data);
                const endTime = performance.now();
                const responseTime = Math.round(endTime - testStartTime);
                addResult(`⚡ ${responseTime}ms:\n${response.response}`, 'success');
            };
            ws.onerror = () => addResult('❌ WebSocket error', 'error');
        }
        
        function addResult(message, className) {
            const div = document.createElement('div');
            div.className = 'result ' + className;
            div.textContent = message;
            document.getElementById('results').appendChild(div);
        }
        
        function testQuery(query) {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                addResult('❌ Not connected', 'error');
                return;
            }
            testStartTime = performance.now();
            ws.send(JSON.stringify({ type: 'chat', message: query, sessionId: 'test-' + Date.now() }));
            addResult(`📤 Testing: "${query}"`, 'info');
        }
        
        window.onload = connectWebSocket;
    </script>
</body>
</html>
